name: release

# Build static CLI binaries for every pushed `v*` tag and attach them to the
# GitHub Release. amd64 + arm64, statically linked against musl.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # `cross` provides docker images with the right musl + C toolchain, so the
      # ring/rustls C bits build cleanly for both architectures.
      - name: Install cross
        run: cargo install cross --locked

      - name: Build
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Package
        run: |
          set -euo pipefail
          bin=tg2zola
          dist="${bin}-${{ matrix.target }}"
          mkdir -p "$dist"
          cp "target/${{ matrix.target }}/release/${bin}" "$dist/"
          cp README.md LICENSE "$dist/" 2>/dev/null || true
          tar -C "$dist" -czf "${dist}.tar.gz" .
          sha256sum "${dist}.tar.gz" > "${dist}.tar.gz.sha256"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            tg2zola-${{ matrix.target }}.tar.gz
            tg2zola-${{ matrix.target }}.tar.gz.sha256
