name: Build
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
env:
  # Pinned zola so the end-to-end HTML test (src/e2e_tests.rs) runs here on every
  # push, not just locally. Keep in sync with daily.yml.
  ZOLA_VERSION: v0.22.1
jobs:
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: Install Rust coverage tools
        run: |
          rustup component add llvm-tools-preview
          cargo install cargo-llvm-cov --locked
      - name: Install zola (so the end-to-end HTML test runs, not skips)
        run: |
          curl -fsSL "https://github.com/getzola/zola/releases/download/${ZOLA_VERSION}/zola-${ZOLA_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | sudo tar -xz -C /usr/local/bin zola
          zola --version
      - name: Generate Rust coverage
        run: cargo llvm-cov --locked --all-targets --lcov --output-path target/lcov.info
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  biome:
    name: Biome (JS lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      # npx (Node is preinstalled on the runner) — no extra pinned action; the
      # Biome version is pinned here. Lints our JS, ignoring vendored min.js.
      - name: Lint src/search.js with Biome
        run: npx --yes @biomejs/biome@1.9.4 ci src/search.js
