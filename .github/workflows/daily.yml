name: daily

# Once a day: restore the previous site from the `blog` branch (which doubles as
# the media cache), scrape + regenerate, build with Zola, publish to GitHub Pages,
# then commit the refreshed site back to the `blog` branch.

on:
  schedule:
    - cron: "17 4 * * *" # 04:17 UTC daily
  workflow_dispatch: {}

permissions:
  contents: write # push the archive to the `blog` branch
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  ZOLA_VERSION: v0.22.1
  # Silence the noisy "punycode module is deprecated" (DEP0040) warning that
  # Node-based actions' transitive deps emit — it's not from our code and not
  # actionable here.
  NODE_OPTIONS: --no-deprecation
  # Which channel to sync. Set a repository *variable* named CHANNEL to override
  # the `channel` in tg2zola.toml without editing the file.
  CHANNEL: ${{ vars.CHANNEL }}
  # Optional external theme (https or ssh git URL). Set a repository *variable*
  # named THEME_REPO to override the built-in black theme. Empty = built-in.
  THEME_REPO: ${{ vars.THEME_REPO }}
  # Repository link shown on the About page → this deployment repo.
  REPO_URL: ${{ github.server_url }}/${{ github.repository }}
  # Optional custom HTML for the About page. Set a repository *variable* named
  # ABOUT to replace the default channel/repo text.
  ABOUT: ${{ vars.ABOUT }}
  # Optional blog title (defaults to the channel name).
  TITLE: ${{ vars.TITLE }}
  # Set the repository variable TAGS_FOOTER to "true" to show the per-post tag
  # footer (tags are clickable in the body regardless).
  TAGS_FOOTER: ${{ vars.TAGS_FOOTER }}
  # Extra pages (Markdown, each starting with a `# Title` heading).
  PAGES: ${{ vars.PAGES }}
  # Full posts per page on the home feed (default 20).
  POSTS_PER_PAGE: ${{ vars.POSTS_PER_PAGE }}
  # Background colors (any CSS color). Defaults: dark #000000, light #ffffff.
  BACKGROUND_DARK_COLOR: ${{ vars.BACKGROUND_DARK_COLOR }}
  BACKGROUND_LIGHT_COLOR: ${{ vars.BACKGROUND_LIGHT_COLOR }}
  # Extra CSS appended to the built-in stylesheet.
  CSS: ${{ vars.CSS }}
  # Body font. FONT is a local/system font stack (e.g. "Georgia, serif").
  # GOOGLE_FONT names a Google Fonts family to load (e.g. "Inter") — an external
  # request. If both are set, the Google font wins.
  FONT: ${{ vars.FONT }}
  GOOGLE_FONT: ${{ vars.GOOGLE_FONT }}
  # Optional web analytics — set the ID as a repository *variable* to inject the
  # tag. GOOGLE_ANALYTICS: a "G-…" measurement ID. YANDEX_METRICA: a counter number.
  GOOGLE_ANALYTICS: ${{ vars.GOOGLE_ANALYTICS }}
  YANDEX_METRICA: ${{ vars.YANDEX_METRICA }}
  # Set to "false" to disable post Next/Prev nav, the "View on Telegram" link,
  # or the RSS feed (all on by default).
  NEXT_PREV: ${{ vars.NEXT_PREV }}
  TELEGRAM_LINK: ${{ vars.TELEGRAM_LINK }}
  RSS: ${{ vars.RSS }}
  # Set to "true" to also generate a podcast feed (audio posts) at /podcast.xml.
  # PODCAST_TAGGED "true" limits it to posts tagged `podcast` (default: all audio).
  PODCAST: ${{ vars.PODCAST }}
  PODCAST_TAGGED: ${{ vars.PODCAST_TAGGED }}
  # Mastodon handle (@user@instance) → fediverse:creator byline on shared-link
  # previews + a rel="me" profile-verification link. Leave empty to omit.
  FEDIVERSE_CREATOR: ${{ vars.FEDIVERSE_CREATOR }}
  # Max post-title length (chars) before truncation (default 200); a truncated
  # title keeps its full first sentence in the body.
  TITLE_MAX_LEN: ${{ vars.TITLE_MAX_LEN }}
  # Header search box. SEARCH_ENGINE: google (default, JS-free form) / duckduckgo
  # / yandex / bing / none. SEARCH_URL: a custom prefix the query is appended to
  # (overrides the engine; uses a tiny inline Enter handler).
  SEARCH_ENGINE: ${{ vars.SEARCH_ENGINE }}
  SEARCH_URL: ${{ vars.SEARCH_URL }}
  # Footer content (plain text, Markdown or HTML). Empty = no footer.
  FOOTER: ${{ vars.FOOTER }}
  # Static host for the About-page size limit: github / gitlab / none. Empty =
  # auto-detect from the Pages URL (github.io / gitlab.io).
  PAGES_HOST: ${{ vars.PAGES_HOST }}
  # strftime format for displayed dates (default "%Y %B %d" → 2025 October 28;
  # use "%Y" for year only).
  DATE_FORMAT: ${{ vars.DATE_FORMAT }}
  # UI language for the site chrome (Newer/Older/Tags/About/…): one of
  # en/be/uk/ru/de/fr/zh/ja/pl/es/ko/ka (default en). Post content is unchanged.
  LANGUAGE: ${{ vars.LANGUAGE }}
  # By default each post is shown by a clickable #id on its date/views line. Set
  # DERIVE_TITLES=true to derive a title from the first sentence instead; with
  # STRIP_TITLE=true that sentence is also dropped from the body.
  DERIVE_TITLES: ${{ vars.DERIVE_TITLES }}
  STRIP_TITLE: ${{ vars.STRIP_TITLE }}
  # Set to "true" to underline links (default: no underline).
  LINK_UNDERLINE: ${{ vars.LINK_UNDERLINE }}
  # Set to "true" for a CSS-only click-to-load YouTube facade (default: direct
  # iframe). Both use youtube.com so plays count toward the viewer's history.
  YOUTUBE_FACADE: ${{ vars.YOUTUBE_FACADE }}
  # Set to "true" to show multi-image posts as a swipeable carousel (opt-in; the
  # swipe is CSS, arrows/dots need JavaScript).
  CAROUSEL: ${{ vars.CAROUSEL }}
  # Set to "true" to ship a small script that reports page height to a host page
  # so the site auto-resizes when embedded in a cross-origin iframe (opt-in).
  EMBED: ${{ vars.EMBED }}
  # Set to "true" to hide the header nav links (tags/calendar/about/custom),
  # leaving only the search box (opt-in).
  HIDE_NAV: ${{ vars.HIDE_NAV }}
  # Set to "true" to keep (download + show) attached media — video and audio —
  # even when the post links YouTube / Apple Podcasts (default: the embed
  # replaces the attached media, to save hosting space).
  KEEP_MEDIA: ${{ vars.KEEP_MEDIA }}
  # Set to "false" to skip resolving genius.com links (which otherwise fetch the
  # page for its YouTube video + lyrics widget). On by default.
  GENIUS: ${{ vars.GENIUS }}
  # Optional Genius API Client Access Token (a *secret*, not a variable). When
  # set, genius.com links resolve via the API instead of scraping (which
  # Cloudflare blocks on CI IPs). Create one at https://genius.com/api-clients.
  GENIUS_TOKEN: ${{ secrets.GENIUS_TOKEN }}
  # Set to "true" to replace a Spotify link with the Spotify player (opt-in;
  # ~30s preview for non-Premium listeners).
  SPOTIFY: ${{ vars.SPOTIFY }}
  # Set to "true" to embed a live Instagram post in place of an attached video
  # (opt-in, off by default; the widget needs JavaScript).
  INSTAGRAM: ${{ vars.INSTAGRAM }}
  # Set to "false" to stop replacing Pinterest pin links with the embedded pin.
  PINTEREST: ${{ vars.PINTEREST }}
  # Set to "true" to add a Pinterest "Save" hover button to the site's own images
  # so visitors can pin them (opt-in; needs JavaScript).
  PINTEREST_SAVE: ${{ vars.PINTEREST_SAVE }}
  # Google Lighthouse scores (About page + README badges) are ON by default; set
  # this repository *variable* to "false" to disable. An optional API key (a
  # *secret*) raises the PageSpeed Insights rate limit.
  PAGESPEED: ${{ vars.PAGESPEED }}
  PAGESPEED_API_KEY: ${{ secrets.PAGESPEED_API_KEY }}
  # Installable PWA (web app manifest + service worker; hides the address bar) is
  # ON by default — set this repository *variable* to "false" to disable it.
  PWA: ${{ vars.PWA }}
  # Set to "true" for offline mode: the service worker precaches the whole archive
  # on any non-cellular connection (Wi-Fi or wired, never mobile data) so the site
  # works fully offline. Off by default; needs JavaScript.
  OFFLINE: ${{ vars.OFFLINE }}
  # Videos are offloaded to this repo's GitHub Releases (kept off the Pages 1 GB
  # quota) by default; set this repository *variable* to "false" to keep them
  # inline in the site instead.
  VIDEO_RELEASES: ${{ vars.VIDEO_RELEASES }}
  # Optional MTProto backend — fetches audio / original photos / big videos the
  # web preview omits. Compiled + run only when TG_SESSION is set (all three are
  # needed). TG_SESSION is FULL account access — keep it a *secret*. Mint it
  # locally with `tg2zola login`.
  TG_API_ID: ${{ secrets.TG_API_ID }}
  TG_API_HASH: ${{ secrets.TG_API_HASH }}
  TG_SESSION: ${{ secrets.TG_SESSION }}
  # MTPROTO_IMAGES: set to "1" to also fetch original-quality photos (opt-in).
  # MTPROTO_VIDEOS: fetching poster-only videos that have no YouTube/Instagram
  # embed is ON by default; set to "false" to disable it (these can be large).
  # Audio is always fetched.
  MTPROTO_IMAGES: ${{ vars.MTPROTO_IMAGES }}
  MTPROTO_VIDEOS: ${{ vars.MTPROTO_VIDEOS }}
  # Archiving other attachments (pdf, zip, rar, …) is on by default; set this
  # repository *variable* to "false" to disable it.
  MTPROTO_FILES: ${{ vars.MTPROTO_FILES }}
  # Set to "false" to skip the YouTube liveness check (a removed video otherwise
  # keeps its local media instead of being replaced by a dead embed).
  LIVENESS: ${{ vars.LIVENESS }}
  # Per-emoji reaction counts (MTProto backend only) are shown by default; set
  # this repository *variable* to "false" to hide them.
  REACTIONS: ${{ vars.REACTIONS }}
  # If the channel description links to an about.me profile, its bio + social
  # links + a contact button are added to the About page (on by default); set
  # this repository *variable* to "false" to disable.
  ABOUT_ME: ${{ vars.ABOUT_ME }}
  # Set to "true" to also copy the about.me bio text onto the About page (default:
  # only its photo, social links and contact button are used).
  ABOUTME_BIO: ${{ vars.ABOUTME_BIO }}
  # Set to "true" to keep the Telegram channel avatar alongside the about.me
  # photo (default: the avatar is dropped when an about.me photo is shown).
  ABOUTME_BOTH_IMAGES: ${{ vars.ABOUTME_BOTH_IMAGES }}
  # Comma-separated tags to surface as #tag links in the top nav, e.g.
  # "music, batumi, cooking".
  TAGS_TO_PAGES: ${{ vars.TAGS_TO_PAGES }}

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    # GitHub-hosted runners cap a job at 6 h; set it explicitly (a full MTProto
    # backfill over a large channel can be slow).
    timeout-minutes: 360
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5
        with:
          # Full history so the About page's recent-commits list (git log -10)
          # shows more than just the latest commit.
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v6

      # The `blog` branch is the cache: it holds the prior content + downloaded
      # media, so we don't re-download everything each run.
      - name: Restore site from blog branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          remote="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          if git ls-remote --exit-code --heads "$remote" blog >/dev/null 2>&1; then
            tmp="$RUNNER_TEMP/blog-in"
            git clone --depth 1 --branch blog "$remote" "$tmp"
            rm -rf site && mkdir -p site
            # Theme is re-cloned below; public/ is rebuilt.
            rsync -a --exclude '/themes' --exclude '/public' "$tmp/site/" site/
          fi

      - name: Install theme
        if: env.THEME_REPO != ''
        run: |
          set -euo pipefail
          name=$(basename "${THEME_REPO%.git}")
          rm -rf site/themes && mkdir -p site/themes
          git clone --depth 1 "$THEME_REPO" "site/themes/$name"
          echo "THEME_NAME=$name" >> "$GITHUB_ENV"

      - name: Install Zola
        run: |
          curl -fsSL "https://github.com/getzola/zola/releases/download/${ZOLA_VERSION}/zola-${ZOLA_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | sudo tar -xz -C /usr/local/bin zola
          zola --version

      - name: Build tg2zola
        # Compile the opt-in MTProto backend only when all three credentials are
        # set — ordinary builds stay light (it pulls in grammers + vendored
        # core2), and we don't compile it just to have enrich() no-op at runtime.
        run: |
          feats=""
          if [ -n "${TG_API_ID:-}" ] && [ -n "${TG_API_HASH:-}" ] && [ -n "${TG_SESSION:-}" ]; then
            feats="--features mtproto"
          fi
          echo "building${feats:+ with mtproto}"
          cargo build --release --locked $feats

      # Generate with the theme if set; if it (or its build) fails, fall back to
      # the built-in templates so the blog ALWAYS publishes.
      - name: Generate + build site
        run: |
          set -euo pipefail
          BASE="${{ steps.pages.outputs.base_url }}"
          gen() {
            local args=(--config tg2zola.toml --site site --init-site --base-url "$BASE")
            [ -n "${CHANNEL:-}" ] && args+=(--channel "$CHANNEL")
            [ -n "${REPO_URL:-}" ] && args+=(--repo-url "$REPO_URL")
            [ -n "${ABOUT:-}" ] && args+=(--about "$ABOUT")
            [ -n "${TITLE:-}" ] && args+=(--title "$TITLE")
            [ "${TAGS_FOOTER:-}" = "true" ] && args+=(--tags-footer)
            [ -n "${PAGES:-}" ] && args+=(--pages "$PAGES")
            [ -n "${POSTS_PER_PAGE:-}" ] && args+=(--posts-per-page "$POSTS_PER_PAGE")
            [ -n "${BACKGROUND_DARK_COLOR:-}" ] && args+=(--background-dark-color "$BACKGROUND_DARK_COLOR")
            [ -n "${BACKGROUND_LIGHT_COLOR:-}" ] && args+=(--background-light-color "$BACKGROUND_LIGHT_COLOR")
            [ -n "${CSS:-}" ] && args+=(--css "$CSS")
            [ -n "${FONT:-}" ] && args+=(--font "$FONT")
            [ -n "${GOOGLE_FONT:-}" ] && args+=(--google-font "$GOOGLE_FONT")
            [ -n "${GOOGLE_ANALYTICS:-}" ] && args+=(--google-analytics "$GOOGLE_ANALYTICS")
            [ -n "${YANDEX_METRICA:-}" ] && args+=(--yandex-metrica "$YANDEX_METRICA")
            [ "${NEXT_PREV:-}" = "false" ] && args+=(--no-next-prev)
            [ "${TELEGRAM_LINK:-}" = "false" ] && args+=(--no-telegram-link)
            [ "${RSS:-}" = "false" ] && args+=(--no-rss)
            [ "${PODCAST:-}" = "true" ] && args+=(--podcast)
            [ "${PODCAST_TAGGED:-}" = "true" ] && args+=(--podcast-tagged)
            [ -n "${FEDIVERSE_CREATOR:-}" ] && args+=(--fediverse-creator "$FEDIVERSE_CREATOR")
            [ -n "${TITLE_MAX_LEN:-}" ] && args+=(--title-max-len "$TITLE_MAX_LEN")
            [ -n "${SEARCH_ENGINE:-}" ] && args+=(--search-engine "$SEARCH_ENGINE")
            [ -n "${SEARCH_URL:-}" ] && args+=(--search-url "$SEARCH_URL")
            [ -n "${FOOTER:-}" ] && args+=(--footer "$FOOTER")
            [ -n "${PAGES_HOST:-}" ] && args+=(--pages-host "$PAGES_HOST")
            [ -n "${DATE_FORMAT:-}" ] && args+=(--date-format "$DATE_FORMAT")
            [ -n "${LANGUAGE:-}" ] && args+=(--language "$LANGUAGE")
            [ "${DERIVE_TITLES:-}" = "true" ] && args+=(--derive-titles)
            [ "${STRIP_TITLE:-}" = "true" ] && args+=(--strip-title)
            [ "${LINK_UNDERLINE:-}" = "true" ] && args+=(--link-underline)
            [ "${YOUTUBE_FACADE:-}" = "true" ] && args+=(--youtube-facade)
            [ "${CAROUSEL:-}" = "true" ] && args+=(--carousel)
            [ "${EMBED:-}" = "true" ] && args+=(--embed)
            [ "${HIDE_NAV:-}" = "true" ] && args+=(--hide-nav)
            [ "${KEEP_MEDIA:-}" = "true" ] && args+=(--keep-media)
            [ "${GENIUS:-}" = "false" ] && args+=(--no-genius)
            [ "${SPOTIFY:-}" = "true" ] && args+=(--spotify)
            [ "${INSTAGRAM:-}" = "true" ] && args+=(--instagram)
            [ "${PINTEREST:-}" = "false" ] && args+=(--no-pinterest)
            [ "${PINTEREST_SAVE:-}" = "true" ] && args+=(--pinterest-save)
            [ "${PAGESPEED:-}" = "false" ] && args+=(--no-pagespeed)
            [ "${PWA:-}" = "false" ] && args+=(--no-pwa)
            [ "${OFFLINE:-}" = "true" ] && args+=(--offline)
            [ "${VIDEO_RELEASES:-}" = "false" ] && args+=(--no-video-releases)
            [ "${LIVENESS:-}" = "false" ] && args+=(--no-liveness)
            [ "${REACTIONS:-}" = "false" ] && args+=(--no-reactions)
            [ "${ABOUT_ME:-}" = "false" ] && args+=(--no-about-me)
            [ "${ABOUTME_BIO:-}" = "true" ] && args+=(--aboutme-bio)
            [ "${ABOUTME_BOTH_IMAGES:-}" = "true" ] && args+=(--aboutme-both-images)
            [ -n "${TAGS_TO_PAGES:-}" ] && args+=(--tags-to-pages "$TAGS_TO_PAGES")
            [ -n "${1:-}" ] && args+=(--theme "$1")
            ./target/release/tg2zola "${args[@]}"
          }
          if [ -n "${THEME_NAME:-}" ]; then
            gen "$THEME_NAME"
            if zola --root site build --base-url "$BASE"; then
              exit 0
            fi
            echo "::warning::Theme '$THEME_NAME' failed to build — falling back to the built-in templates."
            rm -rf site/config.toml site/templates
          fi
          gen ""
          zola --root site build --base-url "$BASE"

      # Offload videos to this repo's Releases (they play from there, so they
      # don't count against the Pages 1 GB quota). tg2zola staged them under
      # site/.video-releases and pointed each <video> at the release URL.
      - name: Upload videos to GitHub Releases
        if: env.VIDEO_RELEASES != 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -d site/.video-releases ] && [ -n "$(ls -A site/.video-releases 2>/dev/null)" ]; then
            gh release view media >/dev/null 2>&1 \
              || gh release create media --title "Media" \
                   --notes "Video assets for the archive, kept off the Pages quota."
            gh release upload media site/.video-releases/* --clobber
          fi

      # After the build, list every published file for the service worker to
      # precache (offline mode only).
      - name: Write PWA precache list
        if: env.OFFLINE == 'true'
        run: ./target/release/tg2zola pwa site/public

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site/public

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5

      - name: Commit site to blog branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          remote="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          work="$RUNNER_TEMP/blog-out"; rm -rf "$work"
          if git ls-remote --exit-code --heads "$remote" blog >/dev/null 2>&1; then
            git clone --depth 1 --branch blog "$remote" "$work"
          else
            git clone --depth 1 "$remote" "$work"
            git -C "$work" checkout --orphan blog
            git -C "$work" rm -rf . >/dev/null 2>&1 || true
          fi
          # Mirror content + media + templates; the external theme is re-cloned
          # each run and the built output is regenerated, so both are excluded.
          rsync -a --delete --exclude '/public' --exclude '/themes' --exclude '/.video-releases' site/ "$work/site/"
          cd "$work"
          git add -A -f site
          if git diff --cached --quiet; then
            echo "No changes to back up."
          else
            git commit -m "blog #${GITHUB_RUN_NUMBER}: $(date -u +%FT%TZ)"
            git push origin HEAD:blog
          fi
